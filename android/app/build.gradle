plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

android { namespace 'com.guardian.parent'; compileSdk 35
    defaultConfig { applicationId 'com.guardian.parent'; minSdk 26; targetSdk 35; versionCode 1; versionName '1.0.0' }
}
flutter { source '../..' }
