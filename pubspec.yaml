name: guardian_parent
description: Consent-first Flutter parental control application for paired family devices.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.1.5
  google_sign_in: ^6.2.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1
  google_maps_flutter: ^2.10.0
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  workmanager: ^0.5.2
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.1
  battery_plus: ^6.2.1
  connectivity_plus: ^6.1.0
  usage_stats: ^1.3.0
  geolocator: ^13.0.2
  package_info_plus: ^8.1.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
